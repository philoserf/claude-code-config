version: "3"

# Markdown is handled by prettier; JSON by biome.
# Both tools honor .gitignore, so scope follows what git tracks.

tasks:
  default:
    desc: Format and lint all files
    cmds:
      - task: format
      - task: lint

  format:
    desc: Format all files
    cmds:
      - task: format:md
      - task: format:json

  lint:
    desc: Lint all files
    cmds:
      - task: lint:json

  format:md:
    desc: Format markdown with prettier
    cmds:
      - bunx prettier --write "**/*.md" --ignore-path=.gitignore

  format:json:
    desc: Format JSON with biome
    cmds:
      - bunx biome format --write .

  lint:json:
    desc: Apply biome lint fixes to JSON
    cmds:
      - bunx biome lint --write .
