# Instincts Configuration
# Configure the behavioral learning system for Claude Code

# Data Flow: observation → observer → instincts → evolution → integration

observation:
  # Enable/disable observation hook that captures all tool usage
  enabled: true

  # Where to store observation logs
  store_path: ~/.claude/learning/observations.jsonl

  # Rotate observations file when it exceeds this size (MB)
  max_file_size_mb: 10

  # Archive processed observations after this many days
  archive_after_days: 7

  # Which tools to observe (capture patterns from)
  capture_tools:
    - Edit
    - Write
    - Bash
    - Read
    - Grep
    - Glob

  # Tools to explicitly skip
  ignore_tools:
    - TodoWrite

observer:
  # Enable background observer agent (analyzes observations → creates instincts)
  # Note: If disabled, instincts can only be created manually or via imports
  enabled: true

  # Which Claude model to use for pattern detection
  model: haiku

  # How often to run analysis (minutes)
  run_interval_minutes: 5

  # Wait for this many observations before analyzing
  min_observations_to_analyze: 20

  # Which pattern types to detect
  patterns_to_detect:
    - user_corrections # When user corrects Claude
    - error_resolutions # How errors are fixed
    - repeated_workflows # Sequences done multiple times
    - tool_preferences # Tools consistently used together
    - file_patterns # How files are organized

instincts:
  # Where to store auto-learned instincts from your sessions
  personal_path: ~/.claude/learning/instincts/personal/

  # Where imported instincts are stored (separate from personal)
  inherited_path: ~/.claude/learning/instincts/inherited/

  # Minimum confidence threshold to create an instinct (0.3 = tentative)
  min_confidence: 0.3

  # Instincts at this confidence level are applied automatically
  auto_approve_threshold: 0.7

  # How fast instincts decay if not re-observed (0.02 = 2% per day)
  confidence_decay_rate: 0.02

  # Maximum number of instincts to keep (oldest/lowest-confidence pruned)
  max_instincts: 100

evolution:
  # Minimum instincts required to form a cluster/evolution candidate
  cluster_threshold: 3

  # Where to store evolved skills, commands, and agents
  evolved_path: ~/.claude/learning/evolved/

  # Automatically run evolution after observer completes
  auto_evolve: false

integration:
  # API endpoint for Skill Creator integration
  skill_creator_api: https://skill-creator.app/api

  # Keep for configuration compatibility
  backward_compatible_v1: true
